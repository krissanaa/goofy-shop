version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: goofy-shop-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: goofy_shop
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - goofy-shop-network

  # PostgreSQL Admin Tool
  pgadmin:
    image: dpage/pgadmin4
    container_name: goofy-shop-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@goofy.shop
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    networks:
      - goofy-shop-network
    depends_on:
      - postgres

  # Optional: Redis for caching/sessions
  redis:
    image: redis:7-alpine
    container_name: goofy-shop-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - goofy-shop-network

volumes:
  postgres_data:

networks:
  goofy-shop-network:
    driver: bridge
